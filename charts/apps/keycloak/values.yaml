keycloak:
  production: true
  proxy: edge                              # TLS на Traefik, Keycloak по HTTP

  auth:
    adminUser: admin
    existingSecret: keycloak-secrets       # ключ: admin-password

  replicaCount: 1

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  httpRelativePath: "/"

  # ── PostgreSQL ──
  postgresql:
    enabled: true
    auth:
      existingSecret: keycloak-secrets     # ключи: postgres-password, password
      username: keycloak
      database: keycloak
    primary:
      persistence:
        enabled: true
        size: 8Gi

  # ── Service ──
  service:
    type: ClusterIP
    ports:
      http: 80

  # ── Ingress ──
  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: auth.echo-messenger.ru
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.entrypoints: websecure,web
      traefik.ingress.kubernetes.io/router.middlewares: keycloak-redirect-to-https@kubernetescrd
    tls: true

openbao:
  clusterSecretStore: openbao-global
  secrets:
    keycloak:
      path: platform/keycloak             # путь в OpenBao